<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beruntung Net - Player Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            /* Background gelap pekat khas warnet gaming / cyber cafe */
            background: radial-gradient(circle at center, #0f1c30 0%, #05080f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Kotak Utama / Panel Login transparan melengkung */
        .login-panel {
            background: rgba(10, 17, 30, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 35px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            /* Border luar tipis dengan sedikit pendaran ganda sesuai gambar */
            border: 2px solid rgba(0, 162, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7), 
                        inset 0 0 15px rgba(0, 162, 255, 0.05);
            position: relative;
        }

        /* Variasi lekukan dekorasi neon di sisi kiri/kanan box biar makin mirip gambar */
        .login-panel::before, .login-panel::after {
            content: '';
            position: absolute;
            top: 20%;
            height: 60%;
            width: 3px;
            border-radius: 10px;
        }
        .login-panel::before {
            left: -2px;
            background: linear-gradient(to bottom, transparent, #00d2ff, transparent);
            box-shadow: -2px 0 10px #00d2ff;
        }
        .login-panel::after {
            right: -2px;
            background: linear-gradient(to bottom, transparent, #ffaa00, transparent);
            box-shadow: 2px 0 10px #ffaa00;
        }

        /* Wadah Logo Beruntung Net */
        .logo-box {
            margin-bottom: 35px;
        }

        .logo-box img {
            max-width: 90%;
            height: auto;
            object-fit: contain;
            /* Efek bayangan neon di belakang logo */
            filter: drop-shadow(0 0 8px rgba(0, 110, 255, 0.5));
        }

        /* Struktur Baris Input + Ikon */
        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
        }

        .input-field {
            flex: 1;
            position: relative;
        }

        .input-field input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(5, 10, 20, 0.8);
            border-radius: 50px; /* Bentuk lonjong kapsul sesuai gambar */
            font-size: 1rem;
            color: #ffffff;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .input-field input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* --- Gaya Spesifik USERNAME (Neon Biru) --- */
        .username-row input {
            border: 2px solid #00a2ff;
            box-shadow: 0 0 10px rgba(0, 162, 255, 0.2);
        }
        .username-row input:focus {
            outline: none;
            box-shadow: 0 0 18px rgba(0, 162, 255, 0.6);
            background: rgba(0, 162, 255, 0.05);
        }
        .icon-box-blue {
            width: 45px;
            height: 45px;
            border: 2px solid #00a2ff;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 8px rgba(0, 162, 255, 0.3);
        }

        /* --- Gaya Spesifik PASSWORD (Neon Kuning) --- */
        .password-row input {
            border: 2px solid #ffaa00;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.2);
        }
        .password-row input:focus {
            outline: none;
            box-shadow: 0 0 18px rgba(255, 170, 0, 0.6);
            background: rgba(255, 170, 0, 0.05);
        }
        .icon-box-yellow {
            width: 45px;
            height: 45px;
            border: 2px solid #ffaa00;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.3);
        }

        /* SVG Ikon Pengganti Gambar Mentah */
        .icon-box-blue svg, .icon-box-yellow svg {
            width: 20px;
            height: 20px;
        }

        /* --- Tombol PLAYER LOGIN (Neon Kuning Tebal) --- */
        .btn-player-login {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 3px solid #ffaa00;
            border-radius: 50px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 25px;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.3), inset 0 0 10px rgba(255, 170, 0, 0.2);
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .btn-player-login:hover {
            background: #ffaa00;
            color: #05080f;
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.8);
            text-shadow: none;
        }

        .btn-player-login svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* --- Link Bawah (Forgot Password & Create Account) --- */
        .bottom-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 0 10px;
        }

        .link-blue {
            color: #00a2ff;
            text-decoration: none;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 162, 255, 0.3);
        }

        .link-yellow {
            color: #ffaa00;
            text-decoration: none;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(255, 170, 0, 0.3);
        }

        .bottom-links a:hover {
            text-decoration: underline;
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="login-panel">
        <!-- Panggil gambar logo referensi Anda -->
        <div class="logo-box">
            <img src="image_f4e23d.jpg" alt="Beruntung Net Gaming Corner">
        </div>

        <form action="#" method="POST">
            <!-- Baris Username -->
            <div class="input-row username-row">
                <div class="input-field">
                    <input type="text" name="username" placeholder="Username" required autocomplete="off">
                </div>
                <div class="icon-box-blue">
                    <!-- Ikon User/Player (SVG) -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="#00a2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <!-- Baris Password -->
            <div class="input-row password-row">
                <div class="input-field">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <div class="icon-box-yellow">
                    <!-- Ikon Gembok/Lock (SVG) -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ffaa00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>

            <!-- Tombol Login ala Power Button Warnet -->
            <button type="submit" class="btn-player-login">
                Player Login
                <!-- Ikon Power (SVG) -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                    <line x1="12" y1="2" x2="12" y2="12"></line>
                </svg>
            </button>
        </form>

        <!-- Menu Bawah -->
        <div class="bottom-links">
            <a href="#" class="link-blue">Forgot Password?</a>
            <a href="#" class="link-yellow">Create Account</a>
        </div>
    </div>

</body>
</html>
