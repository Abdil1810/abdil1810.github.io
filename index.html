<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beruntung Net - RT/RW Net Hotspot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        /* Background Utama: Space Grid & Scanline Effect */
        body {
            background: radial-gradient(circle at center, #0a1122 0%, #010307 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(0, 242, 254, 0.03), rgba(255, 0, 127, 0.02), rgba(0, 255, 136, 0.03));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Panel Utama: Sedikit Membulat dengan Efek Border RGB Berjalan Melengkung */
        .login-panel {
            background: rgba(4, 9, 18, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-radius: 12px; /* Membuat sudut luar sedikit membulat */
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 242, 254, 0.05);
            position: relative;
            z-index: 5;
            overflow: hidden;
        }

        /* Trik Efek Border RGB Berjalan Melengkung Sempurna */
        .login-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 12px;
            padding: 3px; /* Ketebalan Garis RGB */
            background: linear-gradient(var(--angle), #00f2fe, #ff007f, #00ff88, #ffaa00, #00f2fe);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: 4s rgbRotate linear infinite;
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rgbRotate {
            to { --angle: 360deg; }
        }

        /* Wadah Logo: Teks Terbaca Jelas */
        .logo-box {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .logo-box img {
            width: 85%; 
            max-width: 300px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.25)) drop-shadow(0 0 4px rgba(0, 242, 254, 0.6));
        }

        /* Tab Selector: Model Membulat Sleek */
        .tab-container {
            display: flex;
            background: #02050b;
            margin-bottom: 25px;
            padding: 4px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            background: transparent;
            border: none;
            color: #435e7a;
            font-size: 0.8rem;
            font-weight: 900;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #0055cc, #00d2ff);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            text-shadow: 0 0 5px #fff;
        }

        /* Form Area */
        .form-content {
            display: none;
        }
        .form-content.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Desain Input Box: Sedikit Membulat dan Elegan (Gamer UI) */
        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 16px 20px;
            background: #02050a;
            border: 2px solid #142847;
            border-radius: 8px; /* Mengikuti konsep sedikit membulat */
            font-size: 1rem;
            color: #00ffaa;
            text-align: center;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Efek Menyala Saat Input Aktif (Fokus) */
        .class-voucher input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            color: #ffffff;
            text-shadow: 0 0 8px #00d2ff;
        }

        .class-member input:focus {
            border-color: #ffaa00;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.3);
            color: #ffffff;
            text-shadow: 0 0 8px #ffaa00;
        }

        .input-box input::placeholder {
            color: #31465c;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        /* Tag kecil penunjuk fungsionalitas UI */
        .input-tag {
            position: absolute;
            top: -9px;
            left: 12px;
            font-size: 0.6rem;
            color: #435e7a;
            background: #040912;
            padding: 0 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Tombol Connect: Sleek Rounded Gaming Button */
        .btn-connect {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #ff8800, #ffbb00);
            border: none;
            border-radius: 8px; /* Konsisten membulat tipis */
            color: #010307;
            font-size: 1.15rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 136, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-connect::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.6s;
        }

        .btn-connect:hover::before {
            left: 100%;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 35px #ffaa00;
            filter: brightness(1.1);
            letter-spacing: 4px;
        }

        .btn-connect:active {
            transform: translateY(1px);
        }

        /* Info Lapak / Footer */
        .net-info {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #435e7a;
            line-height: 1.6;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .net-info a {
            color: #ffaa00;
            text-decoration: none;
            font-weight: 900;
            border-bottom: 1px dashed #ffaa00;
        }
        
        .net-info a:hover {
            color: #00f2fe;
            border-bottom-color: #00f2fe;
            text-shadow: 0 0 8px #00f2fe;
        }
    </style>
</head>
<body>

    <div class="login-panel">
        <!-- Logo Area -->
        <div class="logo-box">
            <img src="image_f4e23d-removebg-preview.png" alt="Beruntung Net Logo">
        </div>

        <!-- Cyber Tab Selector -->
        <div class="tab-container">
            <button type="button" class="tab-btn active" onclick="switchForm('voucher', this)">Voucher Mode</button>
            <button type="button" class="tab-btn" onclick="switchForm('member', this)">Member Mode</button>
        </div>

        <!-- Form Login Utama -->
        <form action="#" method="POST">
            
            <!-- Tab Form Voucher -->
            <div id="voucher-form" class="form-content active class-voucher">
                <div class="input-box">
                    <span class="input-tag">Voucher Code</span>
                    <input type="text" id="v_user" name="username" placeholder="Masukkan Kode" autocomplete="off" required>
                </div>
                <div class="input-box">
                    <span class="input-tag">Password</span>
                    <input type="password" id="v_pass" name="password" placeholder="Password (Kosongkan jika tidak ada)"> 
                </div>
            </div>

            <!-- Tab Form Member -->
            <div id="member-form" class="form-content class-member">
                <div class="input-box">
                    <span class="input-tag">Member ID</span>
                    <input type="text" id="m_user" placeholder="Username Member" autocomplete="off">
                </div>
                <div class="input-box">
                    <span class="input-tag">Password Key</span>
                    <input type="password" id="m_pass" placeholder="Password Member">
                </div>
            </div>

            <!-- Action Button -->
            <button type="submit" class="btn-connect">Launch Connection</button>
        </form>

        <!-- Footer Info -->
        <div class="net-info">
            Secured Hotspot Network<br>
            Ada Kendala? <a href="https://wa.me/628xxxxxxxxxx" target="_blank">Hubungi Admin</a>
        </div>
    </div>

    <!-- JavaScript Mekanik Tab Switcher -->
    <script>
        function switchForm(type, button) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            document.querySelectorAll('.form-content').forEach(form => form.classList.remove('active'));

            const vUser = document.getElementById('v_user');
            const vPass = document.getElementById('v_pass');
            const mUser = document.getElementById('m_user');
            const mPass = document.getElementById('m_pass');

            if (type === 'voucher') {
                document.getElementById('voucher-form').classList.add('active');
                vUser.setAttribute('name', 'username');
                vPass.setAttribute('name', 'password');
                mUser.removeAttribute('name');
                mPass.removeAttribute('name');
                vUser.required = true;
                mUser.required = false;
            } else {
                document.getElementById('member-form').classList.add('active');
                mUser.setAttribute('name', 'username');
                mPass.setAttribute('name', 'password');
                vUser.removeAttribute('name');
                vPass.removeAttribute('name');
                mUser.required = true;
                vUser.required = false;
            }
        }
    </script>
</body>
</html>
