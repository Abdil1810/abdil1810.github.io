<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beruntung Net - RT/RW Net Hotspot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        /* Background Utama: Space Grid & Scanline Effect */
        body {
            background: radial-gradient(circle at center, #0a1122 0%, #010307 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(0, 242, 254, 0.03), rgba(255, 0, 127, 0.02), rgba(0, 255, 136, 0.03));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Panel Utama: Bentuk Meniru Desain Potong Sudut Tombol dengan Garis RGB */
        .login-panel {
            background: rgba(3, 6, 12, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 45px 35px;
            width: 100%;
            max-width: 430px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 5;
            
            /* Skenario Potong Sudut Menyerupai Tombol */
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
            padding: 3px; /* Ketebalan ruang untuk border palsu */
        }

        /* Container dalam panel agar background gelap tidak tertutup efek RGB */
        .panel-inner {
            background: rgba(3, 6, 12, 0.98);
            width: 100%;
            height: 100%;
            padding: 40px 32px;
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
        }

        /* Efek Lampu RGB Berjalan yang Mengikuti Bentuk Potongan */
        .login-panel::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(#00f2fe, #ff007f, #00ff88, #ffaa00, #00f2fe);
            animation: rgbShift 4s linear infinite;
            z-index: -1;
        }

        @keyframes rgbShift {
            100% { transform: rotate(360deg); }
        }

        /* Wadah Logo: Teks Logo Terbaca Sangat Tajam */
        .logo-box {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .logo-box img {
            width: 85%; 
            max-width: 310px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.25)) drop-shadow(0 0 4px rgba(0, 242, 254, 0.6));
        }

        /* Tab Selector: Model Pemotong Sudut Sci-Fi */
        .tab-container {
            display: flex;
            background: #010408;
            margin-bottom: 30px;
            padding: 3px;
            border: 1px solid rgba(0, 242, 254, 0.25);
            clip-path: polygon(0 0, 93% 0, 100% 30%, 100% 100%, 7% 100%, 0 70%);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            background: transparent;
            border: none;
            color: #435e7a;
            font-size: 0.8rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff0055, #ff5500);
            color: #fff;
            text-shadow: 0 0 8px #fff;
            clip-path: polygon(0 0, 90% 0, 100% 35%, 100% 100%, 10% 100%, 0 65%);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Form Area */
        .form-content {
            display: none;
        }
        .form-content.active {
            display: block;
            animation: formGlitch 0.4s ease-out;
        }

        @keyframes formGlitch {
            0% { opacity: 0; transform: scale(0.95); filter: hue-rotate(90deg); }
            100% { opacity: 1; transform: scale(1); filter: hue-rotate(0deg); }
        }

        /* Mecha Premium Input Wrapper */
        .input-box {
            position: relative;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #091324, #040812);
            clip-path: polygon(8% 0%, 100% 0%, 100% 70%, 92% 100%, 0% 100%, 0% 30%);
            padding: 2px;
        }

        .input-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #12253f;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .input-box:focus-within::before {
            background: linear-gradient(90deg, #00f2fe, #ff007f);
        }

        .input-box input {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 16px 20px;
            background: #02050b;
            border: none;
            font-size: 1.05rem;
            color: #00ffaa;
            text-align: center;
            letter-spacing: 3px;
            font-weight: bold;
            text-transform: uppercase;
