<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beruntung Net - RT/RW Net Hotspot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0f1c30 0%, #05080f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Panel Utama */
        .login-panel {
            background: rgba(10, 17, 30, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 2px solid rgba(0, 162, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        /* Dekorasi Neon Samping */
        .login-panel::before, .login-panel::after {
            content: '';
            position: absolute;
            top: 30%;
            height: 40%;
            width: 3px;
        }
        .login-panel::before { left: -2px; background: #00d2ff; box-shadow: -2px 0 10px #00d2ff; }
        .login-panel::after { right: -2px; background: #ffaa00; box-shadow: 2px 0 10px #ffaa00; }

        /* Wadah Logo */
        .logo-box {
            margin-bottom: 25px;
        }
        .logo-box img {
            max-width: 85%;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(0, 162, 255, 0.5));
        }

        /* Tab Switcher (Voucher / Member) khas RT/RW Net */
        .tab-container {
            display: flex;
            background: rgba(5, 10, 20, 0.6);
            border-radius: 50px;
            margin-bottom: 25px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .tab-btn.active {
            background: #00a2ff;
            color: #fff;
            box-shadow: 0 0 12px rgba(0, 162, 255, 0.5);
        }

        /* Form & Input */
        .form-content {
            display: none;
        }
        .form-content.active {
            display: block;
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(5, 10, 20, 0.9);
            border-radius: 50px;
            font-size: 1rem;
            color: #fff;
            text-align: center; /* Teks di tengah biar gampang ngetik voucher */
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        /* Warna Border Neon Input */
        .voucher-form input { border: 2px solid #00a2ff; box-shadow: 0 0 8px rgba(0, 162, 255, 0.2); }
        .voucher-form input:focus { outline: none; box-shadow: 0 0 15px #00a2ff; }

        .member-form .user-in { border: 2px solid #00a2ff; }
        .member-form .pass-in { border: 2px solid #ffaa00; }
        .member-form input:focus { outline: none; box-shadow: 0 0 15px currentcolor; }

        /* Tombol Connect */
        .btn-connect {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 3px solid #ffaa00;
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255, 170, 0, 0.3);
            transition: all 0.3s ease;
        }

        .btn-connect:hover {
            background: #ffaa00;
            color: #05080f;
            box-shadow: 0 0 20px #ffaa00;
        }

        /* Info Lapak / Cetak Voucher */
        .net-info {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.5;
        }

        .net-info a {
            color: #ffaa00;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-panel">
        <div class="logo-box">
            <img src="image_f4e23d.png" alt="Beruntung Net Logo">
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchForm('voucher', this)">Kode Voucher</button>
            <button class="tab-btn" onclick="switchForm('member', this)">Member / PPT</button>
        </div>

        <form action="#" method="POST">
            
            <div id="voucher-form" class="form-content active class-voucher">
                <div class="input-box voucher-form">
                    <input type="text" name="username" placeholder="MASUKKAN KODE VOUCHER" autocomplete="off">
                    <input type="hidden" name="password" value=""> 
                </div>
            </div>

            <div id="member-form" class="form-content class-member">
                <div class="input-box member-form">
                    <input type="text" class="user-in" placeholder="USERNAME MEMBER" autocomplete="off" style="margin-bottom: 15px;">
                    <input type="password" class="pass-in" placeholder="PASSWORD">
                </div>
            </div>

            <button type="submit" class="btn-connect">Hubungkan Internet</button>
        </form>

        <div class="net-info">
            <p>Belum punya voucher? Hubungi Admin/Operator</p>
            <p style="margin-top: 5px;">WA: <a href="https://wa.me/628xxxxxxxxxx" target="_blank">08xx-xxxx-xxxx</a></p>
        </div>
    </div>

    <script>
        function switchForm(type, button) {
            // Hapus kelas aktif dari semua tab
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // Sembunyikan semua konten form
            document.querySelectorAll('.form-content').forEach(form => form.classList.remove('active'));
            
            // Aktifkan tab dan form yang dipilih
            button.classList.add('active');
            document.getElementById(type + '-form').classList.add('active');
        }
    </script>
</body>
</html>
