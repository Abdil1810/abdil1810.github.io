<style>

*{

body{

height:700px;

left:-250px;

bottom:-250px;

}

.card{

width:390px;

max-width:92%;

padding:40px;

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 0 40px rgba(0,0,0,.45);

}

.logo{

text-align:center;

margin-bottom:28px;

}

.logo svg{

width:80px;

margin-bottom:12px;

.input input::placeholder{

}
