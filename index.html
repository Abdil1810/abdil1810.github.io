```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beruntung Net Hotspot</title>

<meta name="theme-color" content="#2563eb">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#2563eb,#0ea5e9,#10b981);
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:rgba(255,255,255,.08);
border-radius:50%;
top:-250px;
left:-250px;
}

body::after{
content:"";
position:absolute;
width:600px;
height:600px;
background:rgba(255,255,255,.05);
border-radius:50%;
bottom:-250px;
right:-250px;
}

.login-card{
position:relative;
z-index:2;
width:400px;
max-width:92%;
padding:35px;
border-radius:22px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
box-shadow:0 15px 40px rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.2);
color:#fff;
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo h1{
font-size:34px;
font-weight:800;
letter-spacing:1px;
}

.logo span{
color:#9ef01a;
}

.logo p{
margin-top:8px;
opacity:.9;
font-size:15px;
}

.input-group{
margin-top:18px;
}

.input-group input{
width:100%;
padding:14px 16px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.18);
color:#fff;
font-size:15px;
}

.input-group input::placeholder{
color:#eee;
}

button{
width:100%;
margin-top:22px;
padding:14px;
border:none;
border-radius:12px;
background:#10b981;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#059669;
transform:translateY(-2px);
}

.error{
margin-top:15px;
text-align:center;
color:#ffdddd;
font-size:14px;
}

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
opacity:.85;
}

.footer a{
color:white;
text-decoration:none;
font-weight:bold;
}

@media(max-width:480px){

.login-card{
padding:28px;
}

.logo h1{
font-size:28px;
}

}
</style>

</head>

<body>

<div class="login-card">

<div class="logo">

<h1>
BERUNTUNG
<span>NET</span>
</h1>

<p>
Internet Cepat • Stabil • Terpercaya
</p>

</div>

<form
name="login"
action="$(link-login-only)"
method="post">

<input
type="hidden"
name="dst"
value="$(link-orig)">

<input
type="hidden"
name="popup"
value="true">
```
```html
<div class="input-group">
<input
type="text"
name="username"
placeholder="Username"
value="$(username)"
required>
</div>

<div class="input-group">
<input
type="password"
name="password"
placeholder="Password"
required>
</div>

<button type="submit">
LOGIN KE INTERNET
</button>

$(if error)
<div class="error">
$(error)
</div>
$(endif)

</form>

<div class="footer">

<p>
📶 Powered by <b>Beruntung Net</b>
</p>

<br>

<p>
Internet Cepat • Stabil • Terpercaya
</p>

<br>

<p>
WhatsApp Admin
</p>

<p>
<a href="https://wa.me/6281234567890">
0812-3456-7890
</a>
</p>

</div>

</div>

$(if chap-id)

<form
name="sendin"
action="$(link-login-only)"
method="post"
style="display:none">

<input
type="hidden"
name="username">

<input
type="hidden"
name="password">

<input
type="hidden"
name="dst"
value="$(link-orig)">

<input
type="hidden"
name="popup"
value="true">

</form>

<script src="/md5.js"></script>

<script>

document.login.onsubmit=function(){

document.sendin.username.value=
document.login.username.value;

document.sendin.password.value=
hexMD5(
"$(chap-id)"
+
document.login.password.value
+
"$(chap-challenge)"
);

document.sendin.submit();

return false;

};

</script>

$(endif)

</body>
</html>
```
