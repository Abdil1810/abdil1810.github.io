<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beruntung Net - RT/RW Net Hotspot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Background Utama Tetap Gelap Agar Efek Neon Menyala */
        body {
            background: radial-gradient(circle at center, #0f1c30 0%, #05080f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Panel Utama - Diubah Menjadi Gradasi Biru Laut ke Putih */
        .login-panel {
            background: linear-gradient(135deg, #005580 0%, #0099ff 50%, #ffffff 100%);
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        /* Dekorasi Neon Samping */
        .login-panel::before, .login-panel::after {
            content: '';
            position: absolute;
            top: 30%;
            height: 40%;
            width: 3px;
        }
        .login-panel::before { left: -2px; background: #00d2ff; box-shadow: -2px 0 15px #00d2ff; }
        .login-panel::after { right: -2px; background: #ffaa00; box-shadow: 2px 0 15px #ffaa00; }

        /* Wadah Logo - Transparan & Ukuran Diperbesar */
        .logo-box {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        .logo-box img {
            width: 95%; 
            max-width: 340px; 
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
        }

        /* Tab Switcher (Voucher / Member) */
        .tab-container {
            display: flex;
            background: rgba(5, 15, 30, 0.7);
            border-radius: 50px;
            margin-bottom: 25px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .tab-btn.active {
            background: #00a2ff;
            color: #fff;
            box-shadow: 0 0 12px rgba(0, 162, 255, 0.6);
        }

        /* Form & Input */
        .form-content {
            display: none;
        }
        .form-content.active {
            display: block;
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(5, 12, 25, 0.95); /* Dipekatkan sedikit agar teks input putih terlihat jelas */
            border-radius: 50px;
            font-size: 1rem;
            color: #fff;
            text-align: center;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        /* Style Input Mode Voucher */
        .voucher-form .v-code { border: 2px solid #00a2ff; margin-bottom: 15px; }
        .voucher-form .v-pass { border: 2px solid #ffaa00; }
        .voucher-form input:focus { outline: none; box-shadow: 0 0 15px currentcolor; }

        /* Style Input Mode Member */
        .member-form .user-in { border: 2px solid #00a2ff; margin-bottom: 15px; }
        .member-form .pass-in { border: 2px solid #ffaa00; }
        .member-form input:focus { outline: none; box-shadow: 0 0 15px currentcolor; }
